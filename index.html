<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>SQV Chronicles — The Qualification Visit</title>
<style>
*{box-sizing:border-box;margin:0;padding:0;}
:root{
  --bg:#0a1628;--bg2:#0f1e35;--bg3:#162540;
  --accent:#4cc9f0;--accent2:#06d6a0;--warn:#ffd166;--danger:#ef476f;
  --text:#e8f4f8;--muted:#7a9ab0;--border:rgba(76,201,240,0.15);
  --card:rgba(15,30,53,0.95);--font:'Segoe UI',system-ui,sans-serif;
}
body{background:var(--bg);font-family:var(--font);color:var(--text);min-height:100vh;overflow:hidden;-webkit-text-size-adjust:100%;}
.screen{position:fixed;inset:0;display:flex;align-items:center;justify-content:center;overflow-y:auto;-webkit-overflow-scrolling:touch;}
.hidden{display:none!important;}

/* starfield */
#stars{position:fixed;inset:0;pointer-events:none;z-index:0;}

/* ── LOGIN ── */
#s-login{background:transparent;flex-direction:column;align-items:center;z-index:2;}
.login-brand{text-align:center;margin-bottom:28px;}
.login-badge{font-size:10px;letter-spacing:4px;color:var(--accent);opacity:.7;text-transform:uppercase;margin-bottom:8px;}
.login-title{font-size:36px;font-weight:800;color:#fff;letter-spacing:-1px;}
.login-sub{font-size:11px;color:var(--muted);letter-spacing:3px;margin-top:4px;text-transform:uppercase;}
.login-box{background:var(--bg2);border:1px solid var(--border);border-radius:14px;padding:24px 20px;width:min(370px,92vw);display:flex;flex-direction:column;gap:14px;backdrop-filter:blur(8px);}
.login-tabs{display:flex;border:1px solid var(--border);border-radius:8px;overflow:hidden;}
.ltab{flex:1;padding:9px 0;text-align:center;font-size:11px;letter-spacing:2px;text-transform:uppercase;cursor:pointer;color:var(--muted);background:transparent;border:none;transition:all .2s;font-family:var(--font);}
.ltab.active{background:var(--accent);color:#0a1628;font-weight:700;}
.login-label{font-size:11px;color:var(--muted);letter-spacing:1px;text-transform:uppercase;}
.login-input{width:100%;padding:10px 14px;background:rgba(255,255,255,0.04);border:1px solid var(--border);border-radius:7px;color:var(--text);font-size:14px;outline:none;transition:border .2s;font-family:var(--font);}
.login-input:focus{border-color:var(--accent);}
.login-err{font-size:12px;color:var(--danger);text-align:center;min-height:16px;}
.btn-primary{width:100%;padding:12px;background:linear-gradient(135deg,var(--accent),#0096c7);border:none;border-radius:8px;color:#0a1628;font-weight:700;font-size:14px;letter-spacing:1px;cursor:pointer;transition:opacity .2s;font-family:var(--font);}
.btn-primary:hover{opacity:.85;}

/* ── ADMIN ── */
#s-admin{background:var(--bg);flex-direction:column;align-items:center;padding:32px;z-index:2;overflow-y:auto;}
.adm-header{text-align:center;margin-bottom:24px;}
.adm-title{font-size:22px;font-weight:800;color:var(--accent);}
.adm-sub{font-size:12px;color:var(--muted);margin-top:4px;}
.lb-table{width:100%;max-width:560px;border-collapse:collapse;}
.lb-table th{font-size:10px;letter-spacing:2px;text-transform:uppercase;color:var(--muted);padding:8px 12px;border-bottom:1px solid var(--border);text-align:left;}
.lb-table td{padding:10px 12px;font-size:14px;border-bottom:1px solid rgba(255,255,255,0.04);}
.lb-rank{color:var(--warn);font-weight:700;width:40px;}
.lb-score{color:var(--accent2);font-weight:700;}
.lb-grade{font-size:11px;padding:3px 8px;border-radius:20px;font-weight:600;}
.grade-S{background:rgba(6,214,160,0.15);color:var(--accent2);}
.grade-A{background:rgba(76,201,240,0.15);color:var(--accent);}
.grade-B{background:rgba(255,209,102,0.15);color:var(--warn);}
.grade-C{background:rgba(239,71,111,0.15);color:var(--danger);}
.btn-ghost{padding:10px 22px;background:transparent;border:1px solid var(--border);border-radius:8px;color:var(--muted);cursor:pointer;font-size:13px;transition:all .2s;font-family:var(--font);}
.btn-ghost:hover{border-color:var(--accent);color:var(--accent);}
.adm-actions{display:flex;gap:12px;margin-top:20px;}
.lb-empty{color:var(--muted);font-size:13px;padding:24px;text-align:center;}

/* ── GAME ── */
#s-game{background:transparent;flex-direction:column;z-index:2;width:100%;height:100%;overflow:hidden;overflow-y:auto;-webkit-overflow-scrolling:touch;}
#g-hud{display:flex;align-items:center;justify-content:space-between;padding:10px 14px;background:rgba(10,22,40,0.95);border-bottom:1px solid var(--border);backdrop-filter:blur(6px);flex-shrink:0;flex-wrap:wrap;gap:6px;position:sticky;top:0;z-index:10;}
.hud-left{display:flex;align-items:center;gap:16px;}
.hud-logo{font-size:13px;font-weight:700;color:var(--accent);letter-spacing:2px;}
.hud-scene{font-size:11px;color:var(--muted);}
.hud-right{display:flex;align-items:center;gap:20px;}
.hud-score{font-size:20px;font-weight:800;color:var(--accent2);}
.hud-pts-label{font-size:10px;color:var(--muted);text-transform:uppercase;letter-spacing:1px;}
.prog-bar{width:80px;height:4px;background:rgba(255,255,255,0.08);border-radius:2px;overflow:hidden;}
.prog-fill{height:100%;background:linear-gradient(90deg,var(--accent),var(--accent2));transition:width .4s ease;border-radius:2px;}

/* main game area */
#g-main{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:flex-start;padding:16px;overflow-y:auto;overflow-x:hidden;-webkit-overflow-scrolling:touch;padding-bottom:32px;}
#g-scene{width:100%;max-width:720px;display:flex;flex-direction:column;gap:0;box-sizing:border-box;}

/* dialog box */
#g-dialog{background:var(--bg2);border:1px solid var(--border);border-radius:14px;padding:0;overflow:hidden;cursor:pointer;transition:border-color .2s;margin-bottom:0;}
#g-dialog:hover{border-color:rgba(76,201,240,0.35);}
.dlg-speaker-bar{padding:10px 20px 8px;border-bottom:1px solid var(--border);display:flex;align-items:center;gap:10px;}
.dlg-avatar{width:32px;height:32px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:15px;flex-shrink:0;}
.av-cra{background:linear-gradient(135deg,#1a3a5c,#2e6b9e);}
.av-pi{background:linear-gradient(135deg,#1a3a2c,#2e7a4e);}
.av-coord{background:linear-gradient(135deg,#3a2c1a,#7a5a2e);}
.av-lab{background:linear-gradient(135deg,#2c1a3a,#5a2e7a);}
.av-narrator{background:linear-gradient(135deg,#1a1a2e,#2e2e5a);}
.av-pm{background:linear-gradient(135deg,#3a1a1a,#7a2e2e);}
.dlg-speaker{font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:2px;color:var(--accent);}
.dlg-body{padding:16px 20px 18px;}
.dlg-text{font-size:15px;line-height:1.65;color:var(--text);word-break:break-word;}
.dlg-hint{font-size:11px;color:var(--muted);margin-top:10px;opacity:.7;}

/* choices */
#g-choices{display:flex;flex-direction:column;gap:8px;margin-top:12px;}
.choice-btn{padding:13px 18px;background:rgba(15,30,53,0.8);border:1px solid var(--border);border-radius:10px;color:var(--text);font-size:14px;text-align:left;cursor:pointer;transition:all .2s;line-height:1.45;font-family:var(--font);min-height:48px;-webkit-tap-highlight-color:rgba(76,201,240,0.2);touch-action:manipulation;}
.choice-btn:hover{background:rgba(76,201,240,0.08);border-color:rgba(76,201,240,0.4);transform:translateX(3px);}
.choice-btn.correct{background:rgba(6,214,160,0.12);border-color:var(--accent2);color:var(--accent2);}
.choice-btn.wrong{background:rgba(239,71,111,0.1);border-color:var(--danger);color:var(--danger);}
.choice-btn:disabled{cursor:default;transform:none;}

/* feedback overlay */
#g-feedback{display:none;background:var(--bg2);border:1px solid var(--border);border-radius:14px;padding:18px 20px;margin-top:12px;}
.fb-result{font-size:13px;font-weight:700;letter-spacing:1px;margin-bottom:8px;}
.fb-correct .fb-result{color:var(--accent2);}
.fb-wrong .fb-result{color:var(--danger);}
.fb-explanation{font-size:14px;line-height:1.6;color:var(--text);}
.fb-pts{font-size:12px;color:var(--warn);margin-top:8px;}
.btn-next{margin-top:12px;padding:10px 24px;background:linear-gradient(135deg,var(--accent),#0096c7);border:none;border-radius:8px;color:#0a1628;font-weight:700;font-size:13px;cursor:pointer;font-family:var(--font);}

/* final screen */
#g-final{display:none;width:100%;max-width:640px;background:var(--bg2);border:1px solid var(--border);border-radius:16px;padding:32px;text-align:center;overflow-y:auto;max-height:90vh;}
.f-grade{font-size:64px;font-weight:900;line-height:1;}
.f-grade-S{color:var(--accent2);}
.f-grade-A{color:var(--accent);}
.f-grade-B{color:var(--warn);}
.f-grade-C{color:var(--danger);}
.f-title{font-size:20px;font-weight:700;margin-top:8px;}
.f-score{font-size:42px;font-weight:900;color:var(--accent2);margin:8px 0 4px;}
.f-sub{font-size:13px;color:var(--muted);}
.f-bar-wrap{background:rgba(255,255,255,0.06);border-radius:4px;height:8px;margin:16px 0;overflow:hidden;}
.f-bar{height:100%;background:linear-gradient(90deg,var(--accent),var(--accent2));border-radius:4px;transition:width 1s ease;width:0;}
.f-breakdown{display:flex;flex-direction:column;gap:6px;margin:16px 0;text-align:left;}
.f-row{display:flex;justify-content:space-between;align-items:center;padding:8px 12px;background:rgba(255,255,255,0.03);border-radius:7px;font-size:13px;}
.f-row-label{color:var(--muted);flex:1;}
.f-row-pts{color:var(--accent2);font-weight:700;font-size:13px;}
.f-row-result{font-size:13px;margin-right:8px;}
.f-actions{display:flex;gap:10px;justify-content:center;margin-top:16px;}

/* checklist scene */
#g-checklist{display:none;flex-direction:column;gap:8px;margin-top:12px;}
.chk-item{display:flex;align-items:center;gap:12px;padding:11px 16px;background:rgba(15,30,53,0.8);border:1px solid var(--border);border-radius:9px;cursor:pointer;transition:all .2s;font-size:14px;}
.chk-item:hover{border-color:rgba(76,201,240,0.3);}
.chk-item.checked{background:rgba(6,214,160,0.08);border-color:var(--accent2);}
.chk-box{width:20px;height:20px;border:2px solid var(--border);border-radius:4px;flex-shrink:0;display:flex;align-items:center;justify-content:center;transition:all .2s;}
.chk-item.checked .chk-box{background:var(--accent2);border-color:var(--accent2);color:#0a1628;font-size:13px;}
.chk-submit{margin-top:10px;padding:11px 24px;background:linear-gradient(135deg,var(--accent),#0096c7);border:none;border-radius:8px;color:#0a1628;font-weight:700;font-size:13px;cursor:pointer;font-family:var(--font);align-self:flex-start;}

@keyframes fadeIn{from{opacity:0;transform:translateY(8px);}to{opacity:1;transform:translateY(0);}}
.fade-in{animation:fadeIn .3s ease forwards;}

/* ── MOBILE / EDGE ─────────────────────────────────────────── */
@media (max-width: 600px) {
  body { overflow-y: auto; }
  .screen { position: relative; min-height: 100vh; align-items: flex-start; padding-top: 0; }
  #s-login { padding: 32px 16px; }
  #s-game { position: fixed; }
  #g-hud { padding: 8px 12px; }
  .hud-logo { font-size: 11px; }
  .hud-scene { font-size: 10px; display: none; }
  .prog-bar { width: 60px; }
  .hud-score { font-size: 17px; }
  #g-main { padding: 10px 10px 40px; justify-content: flex-start; }
  .dlg-body { padding: 12px 14px 14px; }
  .dlg-text { font-size: 14px; }
  .dlg-speaker-bar { padding: 8px 14px; }
  .choice-btn { font-size: 13px; padding: 12px 14px; }
  .btn-next { width: 100%; }
  #g-final { padding: 20px 16px; border-radius: 0; max-height: none; }
  .f-grade { font-size: 48px; }
  .f-score { font-size: 32px; }
  .f-row { font-size: 12px; }
  .f-row-label { font-size: 11px; }
  #s-admin { padding: 20px 12px; }
}
@media (max-width: 380px) {
  .dlg-text { font-size: 13px; }
  .choice-btn { font-size: 12px; }
  .hud-pts-label { display: none; }
}
</style>
</head>
<body>

<canvas id="stars"></canvas>

<!-- LOGIN -->
<div id="s-login" class="screen">
  <div class="login-brand">
    <div class="login-badge">Syneos Health · Training Sim</div>
    <div class="login-title">SQV Chronicles</div>
    <div class="login-sub">The Qualification Visit</div>
  </div>
  <div class="login-box">
    <div class="login-tabs">
      <button class="ltab active" id="lt-player" onclick="L.tab('player')">Jugador</button>
      <button class="ltab" id="lt-admin" onclick="L.tab('admin')">Admin</button>
    </div>
    <div id="lp-player">
      <div class="login-label">Tu nombre</div>
      <input class="login-input" id="l-name" placeholder="Ej: Maria Garcia" maxlength="30"/>
    </div>
    <div id="lp-admin" class="hidden">
      <div class="login-label">Contraseña</div>
      <input class="login-input" id="l-adm-pass" type="password" placeholder="••••••"/>
    </div>
    <div class="login-err" id="l-err"></div>
    <button class="btn-primary" onclick="L.submit()">INGRESAR</button>
  </div>
</div>

<!-- ADMIN -->
<div id="s-admin" class="screen hidden">
  <div class="adm-header">
    <div class="adm-title">⚡ Leaderboard — EFC18122022</div>
    <div class="adm-sub">Top scores del equipo</div>
  </div>
  <table class="lb-table" id="lb-table"></table>
  <div class="adm-actions">
    <button class="btn-ghost" onclick="show('s-login')">← Volver</button>
    <button class="btn-ghost" onclick="L.clearScores()">🗑 Limpiar</button>
  </div>
</div>

<!-- GAME -->
<div id="s-game" class="screen hidden">
  <div id="g-hud">
    <div class="hud-left">
      <div class="hud-logo">SQV</div>
      <div class="hud-scene" id="h-scene">Escena 1 / 11</div>
      <div class="prog-bar"><div class="prog-fill" id="h-prog" style="width:0%"></div></div>
    </div>
    <div class="hud-right">
      <div>
        <div class="hud-pts-label">Score</div>
        <div class="hud-score" id="h-score">0</div>
      </div>
    </div>
  </div>
  <div id="g-main">
    <div id="g-scene">
      <div id="g-dialog">
        <div class="dlg-speaker-bar">
          <div class="dlg-avatar av-narrator" id="d-avatar">🎙</div>
          <div class="dlg-speaker" id="d-speaker">NARRADOR</div>
        </div>
        <div class="dlg-body">
          <div class="dlg-text" id="d-text"></div>
          <div class="dlg-hint" id="d-hint">Haz clic para continuar ▶</div>
        </div>
      </div>
      <div id="g-choices"></div>
      <div id="g-checklist"></div>
      <div id="g-feedback"></div>
    </div>
    <div id="g-final"></div>
  </div>
</div>

<script>
// ─── STARS ────────────────────────────────────────────────────
(function(){
  const c=document.getElementById('stars'),ctx=c.getContext('2d');
  function resize(){c.width=innerWidth;c.height=innerHeight;}
  resize();window.addEventListener('resize',resize);
  const stars=Array.from({length:140},()=>({x:Math.random()*innerWidth,y:Math.random()*innerHeight,r:Math.random()*1.2+.2,a:Math.random()}));
  function draw(){
    ctx.clearRect(0,0,c.width,c.height);
    stars.forEach(s=>{ctx.beginPath();ctx.arc(s.x,s.y,s.r,0,Math.PI*2);ctx.fillStyle=`rgba(200,230,255,${s.a})`;ctx.fill();});
  }
  draw();
})();

// ─── STORAGE (leaderboard) ─────────────────────────────────────
const STORE_KEY='sqv_lb_v3';
function lbLoad(){try{return JSON.parse(localStorage.getItem(STORE_KEY))||[];}catch{return[];}}
function lbSave(d){localStorage.setItem(STORE_KEY,JSON.stringify(d));}
function lbAdd(name,score,breakdown){
  const d=lbLoad();
  d.push({name,score,breakdown,date:new Date().toLocaleDateString('es-AR')});
  d.sort((a,b)=>b.score-a.score);
  lbSave(d.slice(0,20));
}
function gradeOf(s){return s>=100?'S':s>=80?'A':s>=60?'B':'C';}

// ─── LOGIN ────────────────────────────────────────────────────
const L={
  mode:'player',
  tab(m){
    this.mode=m;
    document.getElementById('lt-player').classList.toggle('active',m==='player');
    document.getElementById('lt-admin').classList.toggle('active',m==='admin');
    document.getElementById('lp-player').classList.toggle('hidden',m!=='player');
    document.getElementById('lp-admin').classList.toggle('hidden',m!=='admin');
    document.getElementById('l-err').textContent='';
  },
  submit(){
    if(this.mode==='player') this.startPlayer();
    else this.loginAdmin();
  },
  startPlayer(){
    const n=document.getElementById('l-name').value.trim();
    if(!n){document.getElementById('l-err').textContent='Ingresá tu nombre';return;}
    G.playerName=n;
    show('s-game');
    G.init();
  },
  loginAdmin(){
    const p=document.getElementById('l-adm-pass').value;
    if(p!=='syneos2024'){document.getElementById('l-err').textContent='Contraseña incorrecta';return;}
    this.renderLb();
    show('s-admin');
  },
  renderLb(){
    const d=lbLoad();
    const t=document.getElementById('lb-table');
    if(!d.length){t.innerHTML=`<tr><td colspan="4" class="lb-empty">Sin registros aún</td></tr>`;return;}
    t.innerHTML=`<thead><tr><th>#</th><th>Nombre</th><th>Score</th><th>Grade</th></tr></thead><tbody>`+
      d.map((e,i)=>{const g=gradeOf(e.score);return`<tr>
        <td class="lb-rank">${i===0?'🥇':i===1?'🥈':i===2?'🥉':i+1}</td>
        <td>${e.name}</td><td class="lb-score">${e.score}/110</td>
        <td><span class="lb-grade grade-${g}">${g}</span></td>
      </tr>`;}).join('')+'</tbody>';
  },
  clearScores(){if(confirm('¿Limpiar todos los scores?')){lbSave([]);this.renderLb();}},
  goLb(){this.renderLb();show('s-admin');}
};

// ─── SCENES ───────────────────────────────────────────────────
// 11 scenes: 10 × 10pts = 100pts + 1 bonus = 110 max
const SCENES = [

  // ── 0: BRIEFING ──────────────────────────────────────────────
  {
    type:'dialog',
    lines:[
      {sp:'NARRADOR',av:'🎙',ac:'av-narrator',
       tx:'Son las 8:50 AM. Estás en el lobby del Hospital Universitario San Martín, revisando tu tablet antes de la visita de calificación del estudio EFC18122022. Tu PM te envió un mensaje esta mañana.'},
      {sp:'PM — SANOFI',av:'💼',ac:'av-pm',
       tx:'Buenos días. Antes de entrar al site, recordá que el objetivo de la SQV es evaluar si el centro tiene la capacidad operativa, científica y logística para conducir el estudio. No es una visita de auditoría — es una conversación. Suerte.'},
      {sp:'NARRADOR',av:'🎙',ac:'av-narrator',
       tx:'Repasás mentalmente las 7 áreas críticas a evaluar durante una SQV. ¿Cuál de las siguientes NO es un área de evaluación estándar?'},
    ],
    question:'¿Cuál de estas NO es un área crítica de evaluación en una SQV?',
    choices:[
      {tx:'Capacidad del equipo y experiencia del PI',correct:false},
      {tx:'Infraestructura y espacio para almacenamiento de IP',correct:false},
      {tx:'Pileta olímpica y sala de descanso del personal',correct:true},
      {tx:'Sistema de manejo de datos (EDC) y conectividad',correct:false},
    ],
    explanation:'Las 7 áreas estándar de una SQV incluyen: experiencia del PI y equipo, infraestructura, almacenamiento de IP, laboratorio, manejo de datos, reclutamiento potencial y procesos regulatorios. Las instalaciones recreativas del personal no forman parte de ninguna evaluación GCP.',
    pts:10,
  },

  // ── 1: ELEGIBILIDAD DEL PI ───────────────────────────────────
  {
    type:'dialog',
    lines:[
      {sp:'NARRADOR',av:'🎙',ac:'av-narrator',
       tx:'Llegás a la oficina del Dr. García, Investigador Principal. Antes de reunirte con él, revisás su CV y credenciales enviados en el Site Qualification Package.'},
      {sp:'CRA — VOS',av:'🩺',ac:'av-cra',
       tx:'Tengo que verificar la elegibilidad del PI. ¿A quién le corresponde esta evaluación?'},
    ],
    question:'¿Quién es responsable de evaluar la elegibilidad del PI en una SQV?',
    choices:[
      {tx:'Tanto el CRA como el Line/Study Manager de Sanofi en conjunto',correct:true},
      {tx:'Solo el CRA asignado al estudio',correct:false},
      {tx:'Únicamente el sponsor (Sanofi), sin intervención del CRA',correct:false},
      {tx:'Solo el Line Manager de la CRO, no el CRA',correct:false},
    ],
    explanation:'La elegibilidad del PI es una evaluación conjunta. El CRA aporta la evaluación de campo (capacidad operativa, entrevista, infraestructura), mientras que el Study/Line Manager valida y aprueba desde el nivel de gestión. Ambos firman o endosan el reporte de SQV.',
    pts:10,
  },

  // ── 2: PI NAÏVE ──────────────────────────────────────────────
  {
    type:'dialog',
    lines:[
      {sp:'CRA — VOS',av:'🩺',ac:'av-cra',
       tx:'Dr. García, ¿ha participado anteriormente en estudios clínicos con Sanofi?'},
      {sp:'DR. GARCÍA — PI',av:'👨‍⚕️',ac:'av-pi',
       tx:'He participado en varios estudios con otras compañías, pero con Sanofi sería la primera vez.'},

// ─── GAME ENGINE ──────────────────────────────────────────────
let G_phase = '';
const G = {
  playerName:'',
  sceneIdx:0,
  lineIdx:0,
  score:0,
  breakdown:[],

  init(){
    this.sceneIdx=0; this.lineIdx=0; this.score=0; this.breakdown=[];
    document.getElementById('g-hud').style.display='flex';
    document.getElementById('g-final').style.display='none';
    document.getElementById('g-scene').style.display='flex';
    this.loadScene();
  },

  loadScene(){
    const sc=SCENES[this.sceneIdx];
    this.lineIdx=0;
    document.getElementById('g-choices').innerHTML='';
    document.getElementById('g-checklist').style.display='none';
    document.getElementById('g-feedback').style.display='none';
    document.getElementById('g-checklist').innerHTML='';
    this.updateHUD();
    this.showLine();
  },

  updateHUD(){
    const pct=Math.round((this.sceneIdx/SCENES.length)*100);
    document.getElementById('h-scene').textContent=`Escena ${this.sceneIdx+1} / ${SCENES.length}`;
    document.getElementById('h-prog').style.width=pct+'%';
    document.getElementById('h-score').textContent=this.score;
  },

  showLine(){
    const sc=SCENES[this.sceneIdx];
    const line=sc.lines[this.lineIdx];
    const dlg=document.getElementById('g-dialog');
    document.getElementById('d-avatar').textContent=line.av;
    document.getElementById('d-avatar').className='dlg-avatar '+line.ac;
    document.getElementById('d-speaker').textContent=line.sp;
    document.getElementById('d-text').textContent=line.tx;
    const isLast=this.lineIdx===sc.lines.length-1;
    document.getElementById('d-hint').textContent=isLast?'':'Haz clic para continuar ▶';
    dlg.classList.add('fade-in');
    setTimeout(()=>dlg.classList.remove('fade-in'),300);

    if(isLast){
      G_phase='ch';
      if(sc.type==='checklist'){
        this.renderChecklist(sc);
      } else {
        this.renderChoices(sc);
      }
    } else {
      G_phase='dl';
    }
  },

  advance(){
    if(G_phase!=='dl') return;
    const sc=SCENES[this.sceneIdx];
    if(this.lineIdx<sc.lines.length-1){
      this.lineIdx++;
      this.showLine();
    }
  },

  renderChoices(sc){
    const wrap=document.getElementById('g-choices');
    wrap.innerHTML='';
    sc.choices.forEach((c,i)=>{
      const btn=document.createElement('button');
      btn.className='choice-btn fade-in';
      btn.style.animationDelay=(i*0.07)+'s';
      btn.textContent=`${['A','B','C','D'][i]}. ${c.tx}`;
      btn.onclick=()=>this.choose(i);
      wrap.appendChild(btn);
    });
  },

  choose(i){
    if(G_phase!=='ch') return;
    G_phase='fb';
    const sc=SCENES[this.sceneIdx];
    const correct=sc.choices[i].correct;
    const pts=correct?sc.pts:0;
    this.score+=pts;
    this.breakdown.push({label:sc.question,pts,max:sc.pts,ok:correct});
    document.getElementById('h-score').textContent=this.score;

    const btns=document.querySelectorAll('.choice-btn');
    btns.forEach((b,j)=>{
      b.disabled=true;
      if(sc.choices[j].correct) b.classList.add('correct');
      else if(j===i && !correct) b.classList.add('wrong');
    });

    const fb=document.getElementById('g-feedback');
    fb.style.display='block';
    fb.className=`fade-in ${correct?'fb-correct':'fb-wrong'}`;
    fb.innerHTML=`
      <div class="fb-result">${correct?'✅ CORRECTO':'❌ INCORRECTO'}</div>
      <div class="fb-explanation">${sc.explanation}</div>
      ${pts>0?`<div class="fb-pts">+${pts} pts</div>`:''}
      <button class="btn-next" onclick="G.next()">Siguiente →</button>
    `;
  },

  renderChecklist(sc){
    const wrap=document.getElementById('g-checklist');
    wrap.style.display='flex';
    wrap.innerHTML='';
    sc.items.forEach((item,i)=>{
      const div=document.createElement('div');
      div.className='chk-item fade-in';
      div.style.animationDelay=(i*0.07)+'s';
      div.innerHTML=`<div class="chk-box" id="chkbox-${i}"></div><span>${item.tx}</span>`;
      div.onclick=()=>{
        div.classList.toggle('checked');
        document.getElementById(`chkbox-${i}`).textContent=div.classList.contains('checked')?'✓':'';
      };
      wrap.appendChild(div);
    });
    const sub=document.createElement('button');
    sub.className='chk-submit fade-in';
    sub.textContent='Confirmar selección';
    sub.onclick=()=>this.submitChecklist(sc);
    wrap.appendChild(sub);
    document.getElementById('g-dialog').style.cursor='default';
  },

  submitChecklist(sc){
    if(G_phase!=='ch') return;
    G_phase='fb';
    const selected=[];
    sc.items.forEach((_,i)=>{
      if(document.querySelector(`.chk-item:nth-child(${i+1})`).classList.contains('checked'))
        selected.push(i);
    });
    const correct=sc.correctRequired.every(r=>selected.includes(r)) &&
      selected.every(s=>sc.correctRequired.includes(s));
    const pts=correct?sc.pts:selected.filter(s=>sc.correctRequired.includes(s)).length>=4?Math.round(sc.pts/2):0;
    this.score+=pts;
    this.breakdown.push({label:'Checklist de almacenamiento de IP',pts,max:sc.pts,ok:correct});
    document.getElementById('h-score').textContent=this.score;

    const fb=document.getElementById('g-feedback');
    fb.style.display='block';
    fb.className=`fade-in ${correct?'fb-correct':'fb-wrong'}`;
    fb.innerHTML=`
      <div class="fb-result">${correct?'✅ COMPLETO':'⚠️ INCOMPLETO'}</div>
      <div class="fb-explanation">${sc.explanation}</div>
      ${pts>0?`<div class="fb-pts">+${pts} pts</div>`:''}
      <button class="btn-next" onclick="G.next()">Siguiente →</button>
    `;
  },

  next(){
    this.sceneIdx++;
    if(this.sceneIdx>=SCENES.length){
      this.showFinal();
    } else {
      this.loadScene();
    }
  },

  showFinal(){
    G_phase='done';
    document.getElementById('g-scene').style.display='none';
    lbAdd(this.playerName,this.score,this.breakdown);

    const maxPts=SCENES.reduce((a,s)=>a+s.pts,0);
    const pct=Math.round((this.score/maxPts)*100);
    const grade=gradeOf(pct);
    const msg={S:'¡Perfecto! Estás listo para auditar sites.',A:'Excelente visita. Muy sólido.',B:'Buen trabajo, hay algunos puntos a reforzar.',C:'Necesitás repasar el material de SQV.'}[grade];

    const fin=document.getElementById('g-final');
    fin.style.display='block';
    fin.innerHTML=`
      <div class="f-grade f-grade-${grade}">${grade}</div>
      <div class="f-title">${msg}</div>
      <div class="f-score">${this.score} / ${maxPts}</div>
      <div class="f-sub">${this.playerName} · ${new Date().toLocaleDateString('es-AR')}</div>
      <div class="f-bar-wrap"><div class="f-bar" id="f-fb"></div></div>
      <div class="f-breakdown">
        ${this.breakdown.map(d=>`
          <div class="f-row">
            <span class="f-row-label">${d.label.length>50?d.label.substring(0,47)+'…':d.label}</span>
            <span class="f-row-result">${d.ok?'✅':'❌'}</span>
            <span class="f-row-pts">${d.pts}/${d.max}</span>
          </div>`).join('')}
      </div>
      <div class="f-actions">
        <button class="btn-ghost" onclick="G.replay()">↩ Jugar de nuevo</button>
        <button class="btn-ghost" onclick="L.goLb()">🏆 Leaderboard</button>
      </div>`;
    setTimeout(()=>{const fb=document.getElementById('f-fb');if(fb)fb.style.width=pct+'%';},200);
  },

  replay(){
    document.getElementById('g-scene').style.display='flex';
    document.getElementById('g-final').style.display='none';
    this.init();
  },
};

// ─── UTILS ────────────────────────────────────────────────────
function show(id){
  ['s-login','s-admin','s-game'].forEach(s=>
    document.getElementById(s).classList.toggle('hidden',s!==id));
}

// ─── KEYBOARD ─────────────────────────────────────────────────
document.addEventListener('keydown',e=>{
  if((e.key===' '||e.key==='Enter')&&G_phase==='dl')G.advance();
  if(e.key==='1'&&G_phase==='ch')G.choose(0);
  if(e.key==='2'&&G_phase==='ch')G.choose(1);
  if(e.key==='3'&&G_phase==='ch')G.choose(2);
  if(e.key==='4'&&G_phase==='ch')G.choose(3);
});
document.getElementById('g-dialog').onclick=()=>{ if(G_phase==='dl')G.advance(); };
document.getElementById('l-name').addEventListener('keydown',e=>{if(e.key==='Enter')L.startPlayer();});
document.getElementById('l-adm-pass').addEventListener('keydown',e=>{if(e.key==='Enter')L.loginAdmin();});
</script>
